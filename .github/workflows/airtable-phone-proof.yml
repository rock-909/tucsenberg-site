name: Airtable Phone Proof

on:
  workflow_dispatch:
    inputs:
      airtable_table_name:
        description: Airtable table name
        type: string
        default: Contacts
        required: true

permissions:
  contents: read

concurrency:
  group: airtable-phone-proof
  cancel-in-progress: false

jobs:
  proof:
    name: Airtable phone column proof
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Airtable proof secrets
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          if [ -z "$AIRTABLE_API_KEY" ] || [ -z "$AIRTABLE_BASE_ID" ]; then
            echo "::error::Configure repository secrets AIRTABLE_API_KEY and AIRTABLE_BASE_ID before running this workflow."
            exit 1
          fi

      - name: Run Airtable phone column proof
        id: proof
        run: >-
          pnpm exec vitest run
          tests/integration/api/airtable-phone-column-direct-proof.test.ts
          --reporter=verbose
        env:
          AIRTABLE_PHONE_PROOF: "1"
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ inputs.airtable_table_name }}

      - name: Record proof result
        if: always()
        env:
          PROOF_SUMMARY_REF: ${{ github.ref }}
          PROOF_SUMMARY_SHA: ${{ github.sha }}
          PROOF_SUMMARY_TABLE: ${{ inputs.airtable_table_name }}
          PROOF_OUTCOME: ${{ steps.proof.outcome }}
        run: node scripts/workflows/write-airtable-phone-proof-summary.mjs
