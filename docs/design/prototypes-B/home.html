document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

icode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f307bd98-095f-401e-a61b-c515fe2a4321\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* =========================================================\n   Tucsenberg B — Design tokens\n   ========================================================= */\n:root {\n  --bg-canvas: #FBFBFC;\n  --bg-panel: #FFFFFF;\n  --bg-subtle: #F5F6F8;\n  --bg-subtle-2: #EEF0F3;\n  --bg-inset: #F8F9FB;\n\n  --border: #E4E7EC;\n  --border-strong: #CFD4DB;\n  --border-graphite: #B4BBC5;\n\n  --ink-1: #0A1628;\n  --ink-2: #3D4759;\n  --ink-3: #5C6675;\n  --ink-4: #8A93A0;\n  --ink-5: #B0B8C2;\n  --ink-on-dark: #F2F4F7;\n  --ink-on-dark-dim: #98A2B3;\n\n  --accent: #0F7B86;\n  --accent-hover: #0A5C66;\n  --accent-soft: #E6F2F4;\n  --accent-strong: #094A52;\n\n  --ok: #15803D;\n  --ok-soft: #E7F6EC;\n  --warn: #B45309;\n  --warn-soft: #FCEFD9;\n  --info: #1D4ED8;\n  --info-soft: #E4EBFB;\n  --neutral: #5C6675;\n  --neutral-soft: #EEF0F3;\n\n  --r-1: 4px;\n  --r-2: 6px;\n  --r-3: 8px;\n\n  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  --devbar-h: 32px;\n  --header-h: 56px;\n  --context-h: 44px;\n\n  /* density tokens — set on <body> */\n  --body-fs: 14.5px;\n  --body-lh: 1.6;\n  --row-py: 14px;\n  --card-pad: 16px;\n  --section-gap: 56px;\n  --display-fs: 52px;\n}\nbody.density-compact {\n  --body-fs: 13px;\n  --body-lh: 1.5;\n  --row-py: 10px;\n  --card-pad: 12px;\n  --section-gap: 36px;\n  --display-fs: 40px;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-ui);\n  font-size: var(--body-fs);\n  line-height: var(--body-lh);\n  color: var(--ink-2);\n  background: var(--bg-canvas);\n  -webkit-font-smoothing: antialiased;\n}\na { color: var(--accent); text-underline-offset: 3px; }\n\n/* =========================================================\n   Dev banner\n   ========================================================= */\n.devbar {\n  height: var(--devbar-h);\n  background: #0A1628;\n  color: var(--ink-on-dark-dim);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  border-bottom: 1px solid #1A2638;\n}\n.devbar a { color: var(--ink-on-dark); text-decoration: underline; }\n.devbar .sep { opacity: 0.45; margin: 0 12px; }\n.devbar .crumb { opacity: 0.75; }\n.devbar .crumb.active { color: var(--ink-on-dark); opacity: 1; }\n\n/* =========================================================\n   Header\n   ========================================================= */\n.appheader {\n  height: var(--header-h);\n  background: var(--bg-panel);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  padding: 0 24px;\n  gap: 24px;\n  position: sticky;\n  top: 0;\n  z-index: 10;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  text-decoration: none;\n  color: var(--ink-1);\n}\n.brand-mark {\n  width: 22px; height: 22px;\n  background: var(--ink-1);\n  display: grid; place-items: center;\n  border-radius: 2px;\n}\n.brand-mark::after {\n  content: \"\";\n  width: 10px; height: 10px;\n  background: var(--accent);\n  border-radius: 1px;\n}\n.brand-name {\n  font-weight: 600;\n  font-size: 14.5px;\n  letter-spacing: -0.005em;\n}\n.nav {\n  display: flex;\n  gap: 2px;\n  margin-left: 12px;\n}\n.nav a {\n  display: inline-flex;\n  align-items: center;\n  height: 32px;\n  padding: 0 10px;\n  border-radius: var(--r-1);\n  font-size: 13.5px;\n  color: var(--ink-2);\n  text-decoration: none;\n  font-weight: 500;\n}\n.nav a:hover { background: var(--bg-subtle); color: var(--ink-1); }\n.nav a.is-current { color: var(--ink-1); background: var(--bg-subtle); }\n.header-right {\n  margin-left: auto;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.search-trigger {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  height: 32px;\n  padding: 0 10px;\n  border: 1px solid var(--border);\n  background: var(--bg-inset);\n  border-radius: var(--r-1);\n  color: var(--ink-4);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  cursor: pointer;\n  min-width: 220px;\n}\n.search-trigger:hover { border-color: var(--border-strong); color: var(--ink-2); }\n.search-trigger .icon { color: var(--ink-4); display: inline-flex; }\n.search-trigger .label { flex: 1; text-align: left; }\n.search-trigger .kbd {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ink-3);\n  border: 1px solid var(--border);\n  border-bottom-width: 2px;\n  padding: 1px 5px;\n  border-radius: 3px;\n  background: var(--bg-panel);\n}\n.lang {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-3);\n  border: 1px solid var(--border);\n  border-radius: var(--r-1);\n  padding: 4px 8px;\n  letter-spacing: 0.04em;\n  background: var(--bg-panel);\n  cursor: pointer;\n}\n.lang:hover { color: var(--ink-1); border-color: var(--border-strong); }\n\n/* =========================================================\n   Buttons\n   ========================================================= */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 6px;\n  height: 34px;\n  padding: 0 14px;\n  border-radius: var(--r-2);\n  font-family: var(--font-ui);\n  font-size: 13.5px;\n  font-weight: 500;\n  border: 1px solid transparent;\n  cursor: pointer;\n  text-decoration: none;\n  white-space: nowrap;\n  transition: background 0.12s, border-color 0.12s, color 0.12s;\n  line-height: 1;\n}\n.btn-primary { background: var(--ink-1); color: #fff; border-color: var(--ink-1); }\n.btn-primary:hover { background: #15233A; }\n.btn-secondary { background: var(--bg-panel); color: var(--ink-1); border-color: var(--border-strong); }\n.btn-secondary:hover { border-color: var(--ink-3); background: var(--bg-subtle); }\n.btn-tertiary { background: transparent; color: var(--accent); border-color: transparent; padding: 0 6px; }\n.btn-tertiary:hover { color: var(--accent-hover); }\n.btn-sm { height: 30px; padding: 0 12px; font-size: 12.5px; border-radius: var(--r-1); }\n\n/* =========================================================\n   Context bar\n   ========================================================= */\n.contextbar {\n  height: var(--context-h);\n  background: var(--bg-panel);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  padding: 0 24px;\n  gap: 16px;\n  font-size: 12.5px;\n}\n.crumbs { display: flex; align-items: center; gap: 6px; color: var(--ink-3); }\n.crumbs a { color: var(--ink-3); text-decoration: none; }\n.crumbs a:hover { color: var(--ink-1); }\n.crumbs .slash { color: var(--ink-5); font-family: var(--font-mono); }\n.crumbs .here { color: var(--ink-1); font-weight: 500; }\n.context-meta {\n  margin-left: auto;\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  color: var(--ink-3);\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n}\n.context-meta .it { display: inline-flex; align-items: center; gap: 6px; }\n.context-meta .it .v { color: var(--ink-1); }\n.crr-dot {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--ok);\n  box-shadow: 0 0 0 3px rgba(21,128,61,0.12);\n}\n\n/* =========================================================\n   Type\n   ========================================================= */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--ink-4);\n  font-weight: 500;\n}\n.eyebrow-row { display: inline-flex; align-items: center; gap: 8px; }\n.eyebrow-row .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }\n\n.display {\n  font-family: var(--font-ui);\n  font-size: var(--display-fs);\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  color: var(--ink-1);\n  font-weight: 500;\n  margin: 0;\n  text-wrap: pretty;\n}\n.body-lg {\n  font-size: 16px;\n  line-height: 1.6;\n  color: var(--ink-2);\n  margin: 0;\n  max-width: 58ch;\n}\nbody.density-compact .body-lg { font-size: 14.5px; }\n\n.label {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--ink-4);\n  font-weight: 500;\n}\n.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n/* =========================================================\n   Card + coverage rows\n   ========================================================= */\n.card {\n  background: var(--bg-panel);\n  border: 1px solid var(--border);\n  border-radius: var(--r-3);\n  overflow: hidden;\n}\n.card-head {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 12px var(--card-pad);\n  border-bottom: 1px solid var(--border);\n  background: var(--bg-inset);\n}\n.card-head .lbl {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 500;\n}\n.card-head .meta {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-4);\n}\n.card-foot {\n  padding: 12px var(--card-pad);\n  border-top: 1px solid var(--border);\n  background: var(--bg-inset);\n  font-size: 12.5px;\n  color: var(--ink-3);\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.coverage { display: flex; flex-direction: column; }\n.coverage-row {\n  display: grid;\n  grid-template-columns: 1fr auto auto;\n  align-items: center;\n  gap: 16px;\n  padding: var(--row-py) var(--card-pad);\n  border-bottom: 1px solid var(--border);\n  cursor: pointer;\n  text-decoration: none;\n  color: inherit;\n}\n.coverage-row:last-child { border-bottom: 0; }\n.coverage-row:hover { background: var(--bg-inset); }\n.coverage-row .name { font-size: 14.5px; color: var(--ink-1); font-weight: 500; display: flex; align-items: center; gap: 8px; }\n.coverage-row .name .arrow { color: var(--ink-4); opacity: 0; transform: translateX(-4px); transition: opacity 0.15s, transform 0.15s; }\n.coverage-row:hover .name .arrow { opacity: 1; transform: translateX(0); }\n.coverage-row .paths { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-3); }\n\n/* =========================================================\n   Pills + tags + chips\n   ========================================================= */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  height: 22px;\n  padding: 0 9px 0 8px;\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  white-space: nowrap;\n  line-height: 1;\n  background: var(--bg-panel);\n  border: 1px solid;\n}\n.pill::before {\n  content: \"\";\n  width: 6px; height: 6px; border-radius: 50%;\n  background: currentColor;\n  flex-shrink: 0;\n}\n.pill.ok { color: var(--ok); border-color: rgba(21,128,61,0.32); }\n.pill.warn { color: var(--warn); border-color: rgba(180,83,9,0.32); }\n.pill.info { color: var(--info); border-color: rgba(29,78,216,0.32); }\n.pill.accent { color: var(--accent); border-color: rgba(15,123,134,0.32); }\n\n.tag {\n  display: inline-flex;\n  align-items: center;\n  height: 22px;\n  padding: 0 7px;\n  border-radius: 3px;\n  background: var(--bg-subtle);\n  border: 1px solid var(--border);\n  color: var(--ink-2);\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  line-height: 1;\n}\n.tag.accent { color: var(--accent); background: var(--accent-soft); border-color: transparent; }\n\n.chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  height: 28px;\n  padding: 0 12px;\n  border: 1px solid var(--border);\n  border-radius: 999px;\n  background: var(--bg-panel);\n  color: var(--ink-2);\n  font-size: 12.5px;\n  cursor: pointer;\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n}\n.chip:hover { border-color: var(--ink-3); color: var(--ink-1); background: var(--bg-inset); }\n\n/* =========================================================\n   Input combo\n   ========================================================= */\n.input-combo {\n  display: flex;\n  align-items: stretch;\n  border: 1px solid var(--border-strong);\n  border-radius: var(--r-2);\n  overflow: hidden;\n  background: var(--bg-panel);\n  height: 44px;\n}\n.input-combo:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,123,134,0.15); }\n.input-combo .input {\n  border: 0;\n  flex: 1;\n  padding: 0 14px;\n  font-family: var(--font-mono);\n  font-size: 13.5px;\n  outline: none;\n  background: transparent;\n  color: var(--ink-1);\n}\n.input-combo .input::placeholder { color: var(--ink-5); }\n.input-combo .submit {\n  border: 0;\n  border-left: 1px solid var(--border);\n  background: var(--ink-1);\n  color: #fff;\n  padding: 0 18px;\n  font-family: var(--font-ui);\n  font-size: 13.5px;\n  font-weight: 500;\n  cursor: pointer;\n}\n.input-combo .submit:hover { background: #15233A; }\n\n/* =========================================================\n   Page layout\n   ========================================================= */\n.page-grid {\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  gap: 56px;\n  max-width: 1320px;\n  margin: 0 auto;\n  padding: 64px 24px 80px;\n  align-items: start;\n}\nbody.density-compact .page-grid { padding: 36px 24px 56px; gap: 40px; }\n\n.hero-eyebrow { margin-bottom: 20px; }\n.hero-h1 { margin-bottom: 20px; }\n.hero-sub { margin-bottom: 32px; }\n\n.start-card {\n  margin-top: 32px;\n}\n.start-card .body-row {\n  padding: 14px var(--card-pad);\n}\n.chips-row {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 8px;\n  padding: 12px var(--card-pad) 14px;\n  border-top: 1px dashed var(--border);\n}\n.chips-row .label-inline {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  color: var(--ink-4);\n  text-transform: uppercase;\n  margin-right: 4px;\n}\n\n/* =========================================================\n   Stats strip below hero (path counts as eyebrow data, no new content)\n   — uses existing data points only\n   ========================================================= */\n.statstrip {\n  max-width: 1320px;\n  margin: 0 auto;\n  padding: 0 24px;\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  border-top: 1px solid var(--border);\n  border-bottom: 1px solid var(--border);\n  background: var(--bg-panel);\n}\n.stat {\n  padding: 18px 24px;\n  border-right: 1px solid var(--border);\n  display: flex;\n  flex-direction: column;\n  gap: 4px;\n}\n.stat:last-child { border-right: 0; }\n.stat .lbl {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--ink-4);\n}\n.stat .val {\n  font-size: 22px;\n  letter-spacing: -0.01em;\n  color: var(--ink-1);\n  font-weight: 500;\n  display: flex;\n  align-items: baseline;\n  gap: 6px;\n}\n.stat .val .unit { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); font-weight: 400; }\n.statstrip-wrap {\n  background: var(--bg-panel);\n  border-top: 1px solid var(--border);\n}\n\n/* =========================================================\n   Footer\n   ========================================================= */\n.pgfooter {\n  border-top: 1px solid var(--border);\n  ba d) { padding-left: 24px; }\n.process-step:last-child { border-right: 0; padding-right: 0; }\n.process-step .num {\n  font-family: var(--font-mono);\n  font-size: 28px;\n  color: var(--ink-5);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  line-height: 1;\n  font-feature-settings: \"tnum\";\n}\n.process-step .ttl {\n  font-size: 15px;\n  color: var(--ink-1);\n  font-weight: 500;\n  letter-spacing: -0.005em;\n  margin: 0;\n  line-height: 1.3;\n}\n.process-step .body {\n  font-size: 13px;\n  color: var(--ink-2);\n  line-height: 1.6;\n  margin: 0;\n}\n.process-foot {\n  margin-top: 28px;\n  text-align: center;\n  font-size: 13px;\n  color: var(--ink-3);\n}\n.process-foot a { color: var(--accent); text-decoration: none; }\n\n/* =========================================================\n   Section 6 — Decision table\n   ========================================================= */\n.decision-table {\n  width: 100%;\n  border-collapse: separate;\n  border-spacing: 0;\n  background: var(--bg-panel);\n  border: 1px solid var(--border);\n  border-radius: var(--r-3);\n  overflow: hidden;\n  font-size: 13.5px;\n}\n.decision-table th,\n.decision-table td {\n  padding: 14px 18px;\n  text-align: left;\n  border-bottom: 1px solid var(--border);\n  border-right: 1px solid var(--border);\n  vertical-align: middle;\n}\n.decision-table th:last-child,\n.decision-table td:last-child { border-right: 0; }\n.decision-table tr:last-child td { border-bottom: 0; }\n.decision-table thead th {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 500;\n  background: var(--bg-inset);\n}\n.decision-table tbody td:first-child {\n  color: var(--ink-1);\n  font-weight: 500;\n  background: var(--bg-inset);\n  width: 38%;\n}\n.decision-foot {\n  margin-top: 18px;\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  flex-wrap: wrap;\n}\n.decision-foot .caption {\n  font-size: 13px;\n  color: var(--ink-3);\n  max-width: 60ch;\n}\n\n/* pill variants used in decision table */\n.pill.ok2 { color: var(--ok); border-color: rgba(21,128,61,0.32); }\n.pill.warn2 { color: var(--warn); border-color: rgba(180,83,9,0.32); }\n.pill.danger { color: #B42318; border-color: rgba(180,35,24,0.32); }\n.pill.gray { color: var(--ink-3); border-color: var(--border-strong); }\n.pill.teal { color: var(--accent); border-color: rgba(15,123,134,0.32); }\n\n/* =========================================================\n   Section 7 — Lead-time cards + QC checklist\n   ========================================================= */\n.lead-cards {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 12px;\n  margin-bottom: 36px;\n}\n.lead-card {\n  background: var(--bg-panel);\n  border: 1px solid var(--border);\n  border-radius: var(--r-3);\n  padding: 22px 20px;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.lead-card .qty {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--ink-1);\n  font-weight: 500;\n  letter-spacing: -0.005em;\n}\n.lead-card .time {\n  font-family: var(--font-ui);\n  font-size: 22px;\n  color: var(--ink-1);\n  font-weight: 500;\n  letter-spacing: -0.015em;\n  line-height: 1.1;\n  margin: 2px 0 4px;\n}\n.lead-card .body {\n  font-size: 13px;\n  color: var(--ink-2);\n  line-height: 1.55;\n  margin: 0;\n}\n.lead-card.is-accent {\n  background: var(--accent-soft);\n  border-color: rgba(15,123,134,0.28);\n}\n.lead-card.is-accent .qty,\n.lead-card.is-accent .time { color: var(--accent-strong); }\n.lead-card.is-accent .body { color: var(--accent-strong); }\n\n.qc-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 12px 32px;\n  padding: 24px 0 0;\n  border-top: 1px solid var(--border);\n}\n.qc-item {\n  display: flex;\n  align-items: flex-start;\n  gap: 12px;\n  font-size: 14px;\n  color: var(--ink-2);\n  line-height: 1.5;\n}\n.qc-check {\n  flex-shrink: 0;\n  width: 18px;\n  height: 18px;\n  border-radius: 4px;\ s: 50%;\n  background: #22C55E;\n  box-shadow: 0 0 0 3px rgba(34,197,94,0.18);\n}\n\n/* =========================================================\n   Section 9 — FAQ\n   ========================================================= */\n.faq {\n  border-top: 1px solid var(--border);\n}\n.faq-item {\n  border-bottom: 1px solid var(--border);\n}\n.faq-item summary {\n  list-style: none;\n  cursor: pointer;\n  padding: 22px 16px 22px 0;\n  display: grid;\n  grid-template-columns: 56px 1fr 24px;\n  gap: 20px;\n  align-items: baseline;\n}\n.faq-item summary::-webkit-details-marker { display: none; }\n.faq-num {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  color: var(--ink-4);\n  text-transform: uppercase;\n}\n.faq-q {\n  font-size: 16px;\n  color: var(--ink-1);\n  font-weight: 500;\n  letter-spacing: -0.005em;\n  line-height: 1.4;\n  text-wrap: pretty;\n}\nbody.density-compact .faq-q { font-size: 14.5px; }\n.faq-toggle {\n  width: 22px; height: 22px;\n  display: inline-grid;\n  place-items: center;\n  color: var(--ink-3);\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  background: var(--bg-panel);\n  transition: transform 0.15s;\n  align-self: center;\n}\n.faq-item[open] .faq-toggle { transform: rotate(45deg); color: var(--accent); border-color: rgba(15,123,134,0.4); }\n.faq-a {\n  padding: 0 16px 24px 76px;\n  font-size: 14.5px;\n  color: var(--ink-2);\n  line-height: 1.65;\n  max-width: 76ch;\n}\nbody.density-compact .faq-a { font-size: 13px; }\n\n/* responsive shrink for narrow viewports */\n@media (max-width: 980px) {\n  .page-grid { grid-template-columns: 1fr; gap: 32px; padding: 36px 20px 56px; }\n  .statstrip { grid-template-columns: repeat(2, 1fr); }\n  .stat:nth-child(2) { border-right: 0; }\n  .pgfooter-top { grid-template-columns: 1fr; }\n  .pgfooter-cols { grid-template-columns: repeat(2, 1fr); }\n  .pgfooter-bot { grid-template-columns: 1fr; }\n  .nav { display: none; }\n  .search-trigger { min-width: 0; }\n  .section-head { grid-template-columns: 1fr; gap: 20px; }\n  .trust-row { grid-template-columns: 1fr; gap: 4px; }\n  .trust-row .eb, .trust-row .val, .trust-row .body { grid-column: 1; grid-row: auto; }\n  .num-cards { grid-template-columns: 1fr; }\n  .num-card { border-right: 0; border-bottom: 1px solid var(--border); }\n  .num-card:last-child { border-bottom: 0; }\n  .type-cards { grid-template-columns: 1fr; }\n  .brand-tiles { grid-template-columns: 1fr 1fr; }\n  .brand-tile:nth-child(3n) { border-right: 1px solid var(--border); }\n  .brand-tile:nth-child(2n) { border-right: 0; }\n  .brand-tile:nth-child(n+4) { border-bottom: 1px solid var(--border); }\n  .brand-tile:nth-last-child(-n+2) { border-bottom: 0; }\n  .risk-cards { grid-template-columns: 1fr 1fr; }\n  .process-grid { grid-template-columns: 1fr 1fr; }\n  .process-step { border-bottom: 1px solid var(--border); padding: 20px; }\n  .process-step:nth-child(2n) { border-right: 0; }\n  .lead-cards { grid-template-columns: 1fr 1fr; }\n  .qc-grid { grid-template-columns: 1fr; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- Dev banner -->\n<div class=\"devbar\">\n  <span class=\"crumb\">Tucsenberg<\u002Fspan>\n  <span class=\"sep\">/<\u002Fspan>\n  <span class=\"crumb\">Static prototype<\u002Fspan>\n  <span class=\"sep\">·<\u002Fspan>\n  <span class=\"crumb active\">Home<\u002Fspan>\n  <span class=\"sep\">·<\u002Fspan>\n  <span class=\"crumb\">V1B — <a href=\"design-system.html\">Design library<\u002Fa><\u002Fspan>\n<\u002Fdiv>\n\n<!-- App header -->\n<header class=\"appheader\" data-screen-label=\"01 Home\">\n  <a href=\"#\" class=\"brand\" aria-label=\"Tucsenberg home\">\n    <span class=\"brand-mark\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"brand-name\">Tucsenberg<\u002Fspan>\n  <\u002Fa>\n  <nav class=\"nav\" aria-label=\"Primary\">\n    <a href=\"#\" class=\"is-current\">Membranes<\u002Fa>\n    <a href=\"#\">Compatibility<\u002Fa>\n    < ree answers\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">What this site helps you confirm<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">Three answers before you place a batch order.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"num-cards\">\n      <div class=\"num-card\">\n        <span class=\"num\">01<\u002Fspan>\n        <h3 class=\"ttl\">Whether your existing diffuser body accepts a compatible membrane.<\u002Fh3>\n        <p class=\"body\">We review by OEM model, dimensions, mounting style, and photos — not by brand name alone. Compatibility is recorded per RFQ.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"num-card\">\n        <span class=\"num\">02<\u002Fspan>\n        <h3 class=\"ttl\">Whether EPDM or TPU/PU is right for your wastewater.<\u002Fh3>\n        <p class=\"body\">Material recommendation starts from waste stream, duty cycle, and fouling history. EPDM is the compatibility default; TPU/PU is triggered by process conditions, not by price tier.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"num-card\">\n        <span class=\"num\">03<\u002Fspan>\n        <h3 class=\"ttl\">Which dimensions and fastening details to verify before order release.<\u002Fh3>\n        <p class=\"body\">Diameter, mounting ring style, perforation pattern, sealing area, and confirmed process temperature. A sample can be dispatched before the first batch.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 2 of 9 — Find by membrane type\n     ========================================================= -->\n<section class=\"section alt\" data-screen-label=\"01 Home — S2 Find by type\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">Browse by membrane type<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">Find by what you are replacing.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-cards\">\n      <a class=\"type-card\" href=\"#\">\n        <span class=\"eb\">Disc membranes<\u002Fspan>\n        <h3 class=\"ttl\">9‑inch &amp; 12‑inch disc replacement<\u002Fh3>\n        <p class=\"body\">Fine‑bubble disc replacement for Sanitaire‑style, EDI‑style, SSI‑style, and Aercor‑style installations where the original body is still serviceable.<\u002Fp>\n        <div class=\"chips\">\n          <span class=\"chip\">9‑inch EPDM<\u002Fspan>\n          <span class=\"chip\">9‑inch TPU/PU<\u002Fspan>\n          <span class=\"chip\">12‑inch EPDM<\u002Fspan>\n          <span class=\"chip\">12‑inch TPU<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"cta\">View disc replacements →<\u002Fspan>\n      <\u002Fa>\n      <a class=\"type-card\" href=\"#\">\n        <span class=\"eb\">Tube membranes<\u002Fspan>\n        <h3 class=\"ttl\">62&nbsp;mm &amp; 91&nbsp;mm tube replacement<\u002Fh3>\n        <p class=\"body\">Tube membrane replacement for installed Stamford Scientific‑style and Nopon‑style systems. Two materials, two outer diameters, batch lengths confirmed before quote.<\u002Fp>\n        <div class=\"chips\">\n          <span class=\"chip\">62&nbsp;mm EPDM<\u002Fspan>\n          <span class=\"chip\">62&nbsp;mm TPU<\u002Fspan>\n          <span class=\"chip\">91&nbsp;mm EPDM<\u002Fspan>\n          <span class=\"chip\">91&nbsp;mm TPU<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"cta\">View tube replacements →<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 3 of 9 — Replacement paths by OEM family\n     ========================================================= -->\n<section class=\"section\" data-screen-label=\"01 Home — S3 OEM families\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">Browse by installed brand<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">Replacement paths by OEM family.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lead\">Each brand page shows compatible Tucsenberg parts with confirmed fit data, documented compatibility‑review steps, and the input we need before quoting.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"brand-tiles\">\n      <a class=\"brand-tile is-active\" href=\"sanitaire.html\">\n        <span class=\"ttl\">Sanitaire‑style<\u002Fspan>\n        <span class=\"sub\">9\" disc · Silver Series<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-active\">Open brand page<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <a class=\"brand-tile is-phase\" href=\"#\">\n        <span class=\"ttl\">EDI‑style<\u002Fspan>\n        <span class=\"sub\">FlexAir · MagnumDisc<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-phase\">Phase 1.5<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <a class=\"brand-tile is-phase\" href=\"#\">\n        <span class=\"ttl\">SSI‑style<\u002Fspan>\n        <span class=\"sub\">AFD350 · AFT150<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-phase\">Phase 1.5<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <a class=\"brand-tile is-phase\" href=\"#\">\n        <span class=\"ttl\">Aercor‑style<\u002Fspan>\n        <span class=\"sub\">9\" disc · tube<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-phase\">Phase 1.5<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <a class=\"brand-tile is-phase\" href=\"#\">\n        <span class=\"ttl\">Stamford Sci.‑style<\u002Fspan>\n        <span class=\"sub\">Tube 62 / 91&nbsp;mm<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-phase\">Phase 1.5<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <a class=\"brand-tile is-phase\" href=\"#\">\n        <span class=\"ttl\">Nopon‑style<\u002Fspan>\n        <span class=\"sub\">Tube · disc<\u002Fspan>\n        <span class=\"stateline\"><span class=\"state-phase\">Phase 1.5<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n    <p class=\"brand-tiles-caption\">OEM names and model series are used for identification and compatibility reference only. No affiliation or endorsement implied. See trademark notice below.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 4 of 9 — Four risks buyers avoid\n     ========================================================= -->\n<section class=\"section alt\" data-screen-label=\"01 Home — S4 Four risks\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">The four risks buyers avoid<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">What goes wrong on aftermarket membrane orders — and how we handle it.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"risk-cards\">\n      <div class=\"risk-card\">\n        <span class=\"eb\">Risk 01<\u002Fspan>\n        <h3 class=\"ttl\">Replace‑in‑kind miss.<\u002Fh3>\n        <p class=\"body\">Airflow and head‑loss change when a \"looks the same\" membrane is not the same. We review by part number plus dimensions before quote, not by model name alone.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"risk-card\">\n        <span class=\"eb\">Risk 02<\u002Fspan>\n        <h3 class=\"ttl\">Material mismatch.<\u002Fh3>\n        <p class=\"body\">Solvent or BTEX exposure is a material‑review trigger — EPDM service life can shorten quickly under those conditions. Material decision starts from waste stream and duty cycle, recorded next to the quote.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"risk-card\">\n        <span class=\"eb\">Risk 03<\u002Fspan>\n        <h3 class=\"ttl\">Late delivery on a shutdown.<\u002Fh3>\n        <p class=\"body\">Quantity‑banded lead times are confirmed before PO, including sample dispatch windows. Urgent shutdown cases get same‑day acknowledgement.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"risk-card\">\n        <span class=\"eb\">Risk 04<\u002Fspan>\n        <h3 class=\"ttl\">First‑order quality scatter.<\u002Fh3>\n        <p class=\"body\">Sample policy + outgoing photo record on first shipments. Lot traceability tied to order number and shipment lot, retained five to seven years.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 5 of 9 — How we review compatibility (4 steps)\n     ========================================================= -->\n<section class=\"section\" data-screen-label=\"01 Home — S5 Compatibility review\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">How we review compatibility<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">From part number to confirmed batch — four steps, recorded each time.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-grid\">\n      <div class=\"process-step\">\n        <span class=\"num\">01<\u002Fspan>\n        <h3 class=\"ttl\">Send what you have.<\u002Fh3>\n        <p class=\"body\">OEM part number, body photos, dimensional drawing, or a CSV of installed models. Anything that identifies the diffuser.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step\">\n        <span class=\"num\">02<\u002Fspan>\n        <h3 class=\"ttl\">We check against tear‑down data.<\u002Fh3>\n        <p class=\"body\">OEM bodies are dimensioned and recorded internally. Compatibility is confirmed against documented inputs, not guessed.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step\">\n        <span class=\"num\">03<\u002Fspan>\n        <h3 class=\"ttl\">Quote with material call.<\u002Fh3>\n        <p class=\"body\">EPDM or TPU/PU recommendation is based on your waste stream, duty cycle, and fouling history — reasons attached to the quote.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step\">\n        <span class=\"num\">04<\u002Fspan>\n        <h3 class=\"ttl\">Sample before batch.<\u002Fh3>\n        <p class=\"body\">Verification samples dispatch in 5–7 business days. First production order can include outgoing photos and lot label record.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"process-foot\">Each review produces one record. <a href=\"#\">See an anonymized sample →<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 6 of 9 — EPDM or TPU/PU decision table\n     ========================================================= -->\n<section class=\"section alt\" data-screen-label=\"01 Home — S6 Material decision\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">Material decision<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">EPDM or TPU/PU? Selected by wastewater conditions.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lead\">EPDM is the compatibility default. TPU/PU is the right choice when process conditions justify it — not because it sounds premium.<\u002Fp>\n    <\u002Fdiv>\n    <table class=\"decision-table\">\n      <thead>\n        <tr>\n          <th>Process condition<\u002Fth>\n          <th>EPDM<\u002Fth>\n          <th>TPU/PU<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Municipal wastewater, no FOG<\u002Ftd>\n          <td><span class=\"pill ok2\">Default<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill gray\">Not needed<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>FOG‑heavy / food waste stream<\u002Ftd>\n          <td><span class=\"pill warn2\">Verify FOG load<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill teal\">Trigger condition<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Solvent / BTEX exposure<\u002Ftd>\n          <td><span class=\"pill danger\">Avoid<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill teal\">Standard call<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Frequent on‑off duty cycling<\u002Ftd>\n          <td><span class=\"pill warn2\">Acceptable<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill teal\">Better fatigue life<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Continuous duty, no exposure shifts<\u002Ftd>\n          <td><span class=\"pill ok2\">Default<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill gray\">Not justified<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Sustained &gt; 45°C process temperature<\u002Ftd>\n          <td><span class=\"pill warn2\">Confirm spec<\u002Fspan><\u002Ftd>\n          <td><span class=\"pill teal\">Trigger condition<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"decision-foot\">\n      <a class=\"btn btn-secondary\" href=\"#\">See full EPDM vs TPU decision guide →<\u002Fa>\n      <span class=\"caption\">Or submit your waste stream details with the RFQ and we will recommend material in the quote.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 7 of 9 — Quality and batch controls\n     ========================================================= -->\n<section class=\"section\" data-screen-label=\"01 Home — S7 Quality &amp; batch\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">Quality and batch controls<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">Confirmed lead times. Documented inspection. Lot‑level traceability.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lead-cards\">\n      <div class=\"lead-card\">\n        <span class=\"qty\">500 – 1,500 pcs<\u002Fspan>\n        <span class=\"time\">2 – 3 weeks<\u002Fspan>\n        <p class=\"body\">Standard batch from confirmed compatibility.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lead-card\">\n        <span class=\"qty\">1,500 – 5,000 pcs<\u002Fspan>\n        <span class=\"time\">3 – 4 weeks<\u002Fspan>\n        <p class=\"body\">Mid‑volume, batch QC plan included.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lead-card\">\n        <span class=\"qty\">5,000 – 7,000+ pcs<\u002Fspan>\n        <span class=\"time\">4 – 6 weeks<\u002Fspan>\n        <p class=\"body\">Multi‑lot. Staged delivery on request.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lead-card is-accent\">\n        <span class=\"qty\">Sample dispatch<\u002Fspan>\n        <span class=\"time\">5 – 7 days<\u002Fspan>\n        <p class=\"body\">Verification sample before first batch.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qc-title\">Inspection checklist<\u002Fdiv>\n    <div class=\"qc-grid\">\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>Part number match against PO line items<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>Membrane diameter and critical thickness<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>Perforation pattern and sealing area<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>Visual defect inspection per shipment<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>Carton count and lot label verification<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"qc-item\">\n        <span class=\"qc-check\"><svg viewBox=\"0 0 16 16\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m3.5 8 3 3 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span>First‑order outgoing photo record on request<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 8 of 9 — Dark CTA\n     ========================================================= -->\n<section class=\"cta-dark\" data-screen-label=\"01 Home — S8 Quote CTA\">\n  <div class=\"cta-dark-inner\">\n    <div class=\"eyebrow-row\">\n      <span class=\"dot\"><\u002Fspan>\n      <span class=\"eyebrow\">Request a quote<\u002Fspan>\n    <\u002Fdiv>\n    <h2 class=\"h2\">Send part number, photos, dimensions, or application data.<\u002Fh2>\n    <p class=\"sub\">Quote starts with the right inputs. Compatibility is reviewed before pricing. Upload a part list or paste OEM models below — we reply within 48 business hours.<\u002Fp>\n    <div class=\"cta-dark-actions\">\n      <a class=\"btn btn-light\" href=\"quote.html\">Request compatibility review →<\u002Fa>\n      <a class=\"btn btn-ghost-teal\" href=\"#\">Identify your membrane first<\u002Fa>\n      <span class=\"sla-pill\">\n        <span class=\"sla-dot\"><\u002Fspan>\n        Same‑day acknowledgement for shutdown cases\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========================================================\n     SECTION 9 of 9 — FAQ (6 items)\n     ========================================================= -->\n<section class=\"section\" data-screen-label=\"01 Home — S9 FAQ\">\n  <div class=\"section-inner\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"eyebrow-row\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"eyebrow\">Common questions before RFQ<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"h2\">Six things buyers ask before sending a part list.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"faq\">\n      <details class=\"faq-item\" open=\"\">\n        <summary>\n          <span class=\"faq-num\">Q · 01<\u002Fspan>\n          <span class=\"faq-q\">Can you confirm compatibility if I send photos and the old part number?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">Yes. Part number plus a body photo and one dimension check is the most common review path. We respond within 24 business hours with what we confirmed and what still needs verification.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary>\n          <span class=\"faq-num\">Q · 02<\u002Fspan>\n          <span class=\"faq-q\">Do you need the exact OEM model, or are dimensions enough?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">Dimensions plus a few photos are usually enough to identify the system. If the diffuser body has unique mounting hardware, we may ask for one additional photo before quoting.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary>\n          <span class=\"faq-num\">Q · 03<\u002Fspan>\n          <span class=\"faq-q\">Can I replace‑in‑kind, or am I changing airflow / head loss if I switch?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">Replace‑in‑kind is the goal for most retrofit orders. If material changes from EPDM to TPU/PU, we flag any expected head‑loss difference in the quote so it can be accounted for in the basin plan.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary>\n          <span class=\"faq-num\">Q · 04<\u002Fspan>\n          <span class=\"faq-q\">What lead time for 500 / 1,500 / 5,000 / 7,000 pieces?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">2–3 weeks (500–1,500), 3–4 weeks (1,500–5,000), and 4–6 weeks (5,000–7,000+). Staged delivery is available for shutdown windows.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary>\n          <span class=\"faq-num\">Q · 05<\u002Fspan>\n          <span class=\"faq-q\">Do you have these in stock, or is this made to order?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">Standard SKUs are made to order against confirmed compatibility. We do not hold speculative stock — this keeps batch traceability tied to one PO. Sample dispatch is the exception, with 5–7 business day turnaround.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary>\n          <span class=\"faq-num\">Q · 06<\u002Fspan>\n          <span class=\"faq-q\">If the parts do not fit, who is responsible?<\u002Fspan>\n          <span class=\"faq-toggle\">+<\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq-a\">Compatibility is reviewed in writing before the quote, and a verification sample is offered for any first-time configuration. If a confirmed match does not fit on receipt, we handle remedy under the order's compatibility‑review record.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Footer -->\n<footer class=\"pgfooter\">\n  <div class=\"pgfooter-inner\">\n    <div class=\"pgfooter-top\">\n      <div class=\"pgfooter-brand\">\n        <a href=\"#\" class=\"brand\">\n          <span class=\"brand-mark\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"brand-name\">Tucsenberg<\u002Fspan>\n        <\u002Fa>\n        <div class=\"pgfooter-brand-meta\">\n          Aftermarket aeration membrane<br>\n          replacements, reviewed before quote<br>\n          <span style=\"color: var(--ink-3);\">quote@tucsenberg.com<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pgfooter-cols\">\n        <div class=\"pgfooter-col\">\n          <span class=\"label\">Membranes<\u002Fspan>\n          <a href=\"9-inch-epdm.html\">9‑inch disc<\u002Fa>\n          <a href=\"#\">12‑inch disc<\u002Fa>\n          <a href=\"#\">Tube 62&nbsp;mm<\u002Fa>\n          <a href=\"#\">Tube 91&nbsp;mm<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"pgfooter-col\">\n          <span class=\"label\">Compatibility<\u002Fspan>\n          <a href=\"sanitaire.html\">Sanitaire‑style<\u002Fa>\n          <a href=\"#\">EDI‑style<\u002Fa>\n          <a href=\"#\">SSI‑style<\u002Fa>\n          <a href=\"#\">Aercor‑style<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"pgfooter-col\">\n          <span class=\ ;\nconst cmdkField = document.getElementById('cmdk-field');\nfunction openCmdk(){ cmdkBackdrop.classList.add('is-open'); setTimeout(()=>cmdkField.focus(),0); }\nfunction closeCmdk(){ cmdkBackdrop.classList.remove('is-open'); }\ncmdkTrigger.addEventListener('click', openCmdk);\ncmdkBackdrop.addEventListener('click', (e)=>{ if(e.target===cmdkBackdrop) closeCmdk(); });\ndocument.addEventListener('keydown', (e)=>{\n  if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')) { e.preventDefault(); openCmdk(); }\n  else if(e.key==='Escape' && cmdkBackdrop.classList.contains('is-open')) closeCmdk();\n});\n\n// ===== Tweaks panel (host-aware) =====\nconst tweaksPanel = document.getElementById('tweaks-panel');\nconst tweaksClose = document.getElementById('tweaks-close');\n\nfunction applyDensity(v) {\n  if (v === 'compact') document.body.classList.add('density-compact');\n  else document.body.classList.remove('density-compact');\n  // reflect in segmented control\n  document.querySelectorAll('.seg-opt[data-density]').forEach(el => {\n    el.classList.toggle('is-on', el.dataset.density === v);\n  });\n}\napplyDensity(TWEAK_DEFAULTS.density);\n\ndocument.querySelectorAll('.seg-opt[data-density]').forEach(el => {\n  el.addEventListener('click', () => {\n    const v = el.dataset.density;\n    applyDensity(v);\n    try {\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{density: v}}, '*');\n    } catch(_){}\n  });\n});\n\n// Host protocol\nwindow.addEventListener('message', (e) => {\n  const d = e && e.data || {};\n  if (d.type === '__activate_edit_mode') tweaksPanel.classList.add('is-open');\n  else if (d.type === '__deactivate_edit_mode') tweaksPanel.classList.remove('is-open');\n});\ntweaksClose.addEventListener('click', () => {\n  tweaksPanel.classList.remove('is-open');\n  try { window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(_){}\n});\ntry { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(_){}\n<\u002Fscript>
