<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Tucsenberg Site Project Architecture Diagram</title>
  <desc id="desc">Tucsenberg English B2B website architecture showing Cloudflare delivery, app, content, lead capture, integrations, and quality guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f9fd"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#004d9e"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#8aa7c4" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6f95"/>
    </marker>
    <style>
      .title { font: 700 40px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 22px Inter, Arial, sans-serif; fill: #0f172a; }
      .section-note { font: 500 15px Inter, Arial, sans-serif; fill: #64748b; }
      .box-title { font: 700 19px Inter, Arial, sans-serif; fill: #0f172a; }
      .box-copy { font: 500 15px Inter, Arial, sans-serif; fill: #334155; }
      .code { font: 600 13px "SFMono-Regular", Menlo, Consolas, monospace; fill: #004d9e; }
      .tiny { font: 500 12px Inter, Arial, sans-serif; fill: #64748b; }
      .chip { font: 700 12px Inter, Arial, sans-serif; fill: #0f172a; }
      .panel { fill: url(#panel); stroke: #cfdbea; stroke-width: 1.5; filter: url(#shadow); }
      .box { fill: #ffffff; stroke: #d7e3f0; stroke-width: 1.4; filter: url(#shadow); }
      .accent-box { fill: #f3f8ff; stroke: #8db2dd; stroke-width: 1.6; filter: url(#shadow); }
      .lane { fill: #ffffff; stroke: #d8e3ef; stroke-width: 1.6; }
      .flow { stroke: #4f6f95; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .flow-soft { stroke: #8aa7c4; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #d7e1ec; stroke-width: 1.4; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="url(#bg)"/>
  <rect x="48" y="38" width="1704" height="1124" rx="28" fill="none" stroke="#d7e1ec" stroke-width="2"/>

  <text x="84" y="96" class="title">Tucsenberg Site - Current Project Architecture</text>
  <text x="84" y="130" class="subtitle">Single-site Next.js 16 platform with English content, guarded lead capture, Cloudflare delivery, and repo-level quality gates</text>

  <rect x="84" y="164" width="240" height="34" rx="17" fill="url(#accent)"/>
  <text x="107" y="186" class="chip" fill="#ffffff">Current truth: English single-site; no /zh route</text>

  <g>
    <rect x="84" y="228" width="1300" height="170" rx="26" class="panel"/>
    <text x="112" y="268" class="section-title">1. Delivery and routing layer</text>
    <text x="112" y="294" class="section-note">What reaches the buyer first: browser request, locale routing, security headers, and deployed worker runtime</text>

    <rect x="116" y="320" width="248" height="54" rx="16" class="accent-box"/>
    <text x="140" y="353" class="box-title">Overseas buyer browsers</text>

    <rect x="404" y="308" width="280" height="78" rx="18" class="box"/>
    <text x="430" y="338" class="box-title">Cloudflare edge entry</text>
    <text x="430" y="361" class="box-copy">Preview / production worker routes requests</text>
    <text x="430" y="380" class="code">wrangler.jsonc + .open-next/worker.js</text>

    <rect x="724" y="308" width="310" height="78" rx="18" class="box"/>
    <text x="750" y="338" class="box-title">Middleware gate</text>
    <text x="750" y="361" class="box-copy">Retired-locale fast 404 + locale routing</text>
    <text x="750" y="380" class="code">src/middleware.ts</text>

    <rect x="1074" y="308" width="278" height="78" rx="18" class="box"/>
    <text x="1100" y="338" class="box-title">App Router pages</text>
    <text x="1100" y="361" class="box-copy">Server Components by locale</text>
    <text x="1100" y="380" class="code">src/app/[locale]/**</text>

    <path d="M364 347 L404 347" class="flow"/>
    <path d="M684 347 L724 347" class="flow"/>
    <path d="M1034 347 L1074 347" class="flow"/>
  </g>

  <g>
    <rect x="84" y="430" width="1300" height="258" rx="26" class="panel"/>
    <text x="112" y="470" class="section-title">2. Experience layer</text>
    <text x="112" y="496" class="section-note">The visible site is composed from route shells, reusable blocks, forms, and product/content presentation components</text>

    <rect x="118" y="526" width="286" height="126" rx="20" class="box"/>
    <text x="144" y="558" class="box-title">Page shells and route views</text>
    <text x="144" y="585" class="box-copy">Home, products, guides, contact, legal</text>
    <text x="144" y="608" class="code">src/app/[locale]/page.tsx</text>
    <text x="144" y="628" class="code">src/app/[locale]/*/page.tsx</text>

    <rect x="436" y="526" width="286" height="126" rx="20" class="box"/>
    <text x="462" y="558" class="box-title">Reusable UI and sections</text>
    <text x="462" y="585" class="box-copy">Header, footer, sections, blocks, shadcn-based UI</text>
    <text x="462" y="608" class="code">src/components/sections/**</text>
    <text x="462" y="628" class="code">src/components/ui/**</text>

    <rect x="754" y="526" width="286" height="126" rx="20" class="box"/>
    <text x="780" y="558" class="box-title">Lead capture interfaces</text>
    <text x="780" y="585" class="box-copy">Shared inquiry forms and product handoff</text>
    <text x="780" y="608" class="code">src/components/forms/**</text>
    <text x="780" y="628" class="code">src/components/products/**</text>

    <rect x="1072" y="526" width="280" height="126" rx="20" class="box"/>
    <text x="1098" y="558" class="box-title">SEO and trust surface</text>
    <text x="1098" y="585" class="box-copy">Metadata, sitemap, structured data, trust proof</text>
    <text x="1098" y="608" class="code">src/lib/seo-metadata.ts</text>
    <text x="1098" y="628" class="code">src/components/seo/**</text>

    <path d="M1182 386 L1182 526" class="flow"/>
    <path d="M899 652 L899 732" class="flow"/>
    <path d="M260 652 L260 722" class="flow-soft"/>
    <path d="M579 652 L579 722" class="flow-soft"/>
    <path d="M1212 652 L1212 722" class="flow-soft"/>
  </g>

  <g>
    <rect x="84" y="720" width="624" height="256" rx="26" class="panel"/>
    <text x="112" y="760" class="section-title">3. Content and truth sources</text>
    <text x="112" y="786" class="section-note">Single source of truth is split by purpose: structured site config, editorial MDX, and locale messages</text>

    <rect x="118" y="818" width="176" height="124" rx="18" class="box"/>
    <text x="142" y="850" class="box-title">Site config</text>
    <text x="142" y="877" class="box-copy">Brand facts, product catalog, SEO truth</text>
    <text x="142" y="900" class="code">src/config/single-site*.ts</text>

    <rect x="310" y="818" width="176" height="124" rx="18" class="box"/>
    <text x="334" y="850" class="box-title">MDX content</text>
    <text x="334" y="877" class="box-copy">Guides, legal, about</text>
    <text x="334" y="900" class="code">content/**</text>
    <text x="334" y="920" class="code">scripts/starter-checks.js content-manifest</text>

    <rect x="502" y="818" width="176" height="124" rx="18" class="box"/>
    <text x="526" y="850" class="box-title">Messages</text>
    <text x="526" y="877" class="box-copy">English physical message packs</text>
    <text x="526" y="900" class="code">messages/base/** + profiles/**</text>

    <path d="M206 818 L206 690" class="flow-soft"/>
    <path d="M398 818 L398 690" class="flow-soft"/>
    <path d="M590 818 L590 690" class="flow-soft"/>
  </g>

  <g>
    <rect x="742" y="720" width="642" height="438" rx="26" class="panel"/>
    <text x="770" y="760" class="section-title">4. Business logic and protection layer</text>
    <text x="770" y="786" class="section-note">All form submissions converge into guarded server paths, then move through validation, Turnstile, and the lead pipeline</text>

    <rect x="774" y="816" width="260" height="102" rx="18" class="box"/>
    <text x="798" y="848" class="box-title">Server adapters</text>
    <text x="798" y="875" class="box-copy">Single public inquiry route</text>
    <text x="798" y="898" class="code">src/app/api/inquiry/route.ts</text>
    <text x="798" y="918" class="code">src/lib/lead-pipeline/**</text>

    <rect x="1062" y="816" width="288" height="102" rx="18" class="box"/>
    <text x="1086" y="848" class="box-title">Validation and anti-abuse</text>
    <text x="1086" y="875" class="box-copy">Schema checks, rate limit, client IP, Turnstile</text>
    <text x="1086" y="898" class="code">src/lib/lead-pipeline/lead-schema.ts</text>
    <text x="1086" y="918" class="code">src/lib/security/**</text>

    <rect x="774" y="956" width="260" height="100" rx="18" class="box"/>
    <text x="798" y="988" class="box-title">Lead processing core</text>
    <text x="798" y="1015" class="box-copy">One canonical inquiry write path</text>
    <text x="798" y="1038" class="code">src/lib/lead-pipeline/**</text>
    <text x="798" y="1058" class="code">src/lib/lead-pipeline/process-lead.ts</text>

    <rect x="1062" y="956" width="288" height="100" rx="18" class="accent-box"/>
    <text x="1086" y="988" class="box-title">Unified lead pipeline</text>
    <text x="1086" y="1015" class="box-copy">RFQ + catalog + buyer-interest leads</text>
    <text x="1086" y="1038" class="code">src/lib/lead-pipeline/{lead-schema,process-lead,utils}.ts</text>

    <rect x="918" y="1086" width="270" height="52" rx="16" class="box"/>
    <text x="944" y="1118" class="box-title">Cache + observability + health</text>

    <path d="M899 652 L899 816" class="flow"/>
    <path d="M1034 866 L1062 866" class="flow"/>
    <path d="M1162 918 L1162 956" class="flow"/>
    <path d="M904 918 L904 956" class="flow"/>
    <path d="M1034 1006 L1062 1006" class="flow"/>
    <path d="M1162 1056 L1162 1086" class="flow"/>
  </g>

  <g>
    <rect x="1418" y="228" width="296" height="520" rx="26" class="panel"/>
    <text x="1446" y="268" class="section-title">5. External integrations</text>
    <text x="1446" y="294" class="section-note">The site talks to buyer-facing security and downstream sales tooling, plus Cloudflare cache primitives</text>

    <rect x="1450" y="326" width="232" height="74" rx="18" class="box"/>
    <text x="1474" y="356" class="box-title">Cloudflare Turnstile</text>
    <text x="1474" y="379" class="box-copy">Bot check before submit</text>

    <rect x="1450" y="430" width="232" height="74" rx="18" class="box"/>
    <text x="1474" y="460" class="box-title">Airtable</text>
    <text x="1474" y="483" class="box-copy">Lead records and CRM-style storage</text>

    <rect x="1450" y="534" width="232" height="74" rx="18" class="box"/>
    <text x="1474" y="564" class="box-title">Resend</text>
    <text x="1474" y="587" class="box-copy">Email notifications and confirmations</text>

    <rect x="1450" y="638" width="232" height="86" rx="18" class="box"/>
    <text x="1474" y="668" class="box-title">Cloudflare static runtime</text>
    <text x="1474" y="691" class="box-copy">OpenNext Worker, assets binding, API split</text>
    <text x="1474" y="710" class="code">wrangler.jsonc</text>

    <path d="M1350 866 C1390 866 1390 363 1450 363" class="flow-soft"/>
    <path d="M1350 1006 C1390 1006 1390 467 1450 467" class="flow-soft"/>
    <path d="M1350 1006 C1390 1006 1390 571 1450 571" class="flow-soft"/>
    <path d="M1188 1112 C1300 1112 1320 681 1450 681" class="flow-soft"/>
  </g>

  <g>
    <rect x="84" y="1008" width="624" height="150" rx="26" class="panel"/>
    <text x="112" y="1048" class="section-title">6. Repo guardrails and proof layer</text>
    <text x="112" y="1074" class="section-note">This repo is not just an app; it also carries a heavy self-check system to stop drift and prove behavior before shipping</text>

    <rect x="118" y="1094" width="176" height="40" rx="14" class="box"/>
    <text x="142" y="1120" class="box-title">Vitest + Playwright</text>

    <rect x="310" y="1094" width="176" height="40" rx="14" class="box"/>
    <text x="334" y="1120" class="box-title">CI + quality gates</text>

    <rect x="502" y="1094" width="176" height="40" rx="14" class="box"/>
    <text x="526" y="1120" class="box-title">Architecture review scripts</text>

    <path d="M708 1083 L742 1083" class="flow-soft"/>
  </g>

  <line x1="1418" y1="780" x2="1714" y2="780" class="divider"/>
  <text x="1448" y="812" class="box-title">Deployment build chain</text>
  <text x="1448" y="840" class="box-copy">Next.js + next-intl + MDX plugins, then OpenNext to Cloudflare</text>
  <text x="1448" y="866" class="code">next.config.ts + scripts/starter-checks.js</text>

  <line x1="84" y1="1000" x2="1384" y2="1000" class="divider"/>
  <text x="92" y="1188" class="tiny">Reading direction: top to bottom. Main user flow runs from browser to app, then into guarded server paths and the lead pipeline.</text>
  <text x="1365" y="1188" class="tiny" text-anchor="end">Maintained from the current repo structure</text>
</svg>
