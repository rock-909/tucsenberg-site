# Git Hooks管理配置
# 自动化质量门禁系统 - 确保代码质量和安全性
# 质量阈值通过保留的 starter proof / direct scripts 管理
pre-commit:
  parallel: true
  commands:
    # 代码格式检查 (Prettier)
    # 用 lefthook 官方 {staged_files} 模板 + glob 过滤，替代手写 git diff 管道
    # （$FILES 未加引号会在含空格文件名时碎裂）。纯 --check 不写文件，无 stage_fixed。
    format-check:
      glob: "*.{js,jsx,ts,tsx,json,md,mdx,yml,yaml,css,scss,html}"
      run: pnpm exec prettier --check {staged_files}
      fail_text: '代码格式检查失败 - 请运行 pnpm exec prettier --write <files> 修复格式问题'

    # TypeScript类型检查（纯检查，不写文件——不挂 stage_fixed）
    type-check:
      run: pnpm type-check
      fail_text: 'TypeScript类型检查失败 - 请修复类型错误后重新提交'

    # 代码质量检查 (ESLint，纯检查不写文件——不挂 stage_fixed)
    quality-check:
      run: pnpm lint:check
      fail_text: '代码质量检查失败 - 发现新的质量问题，请修复后重新提交'

    # 架构守卫 - 仅检查已暂存的 JS/TS 变更（排除测试文件和脚本目录）
    architecture-guard:
      run: |
        FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx|js|jsx)$' | grep -v '^tests/' | grep -v '__tests__' | grep -v '^scripts/' | grep -v '^src/test/' | grep -v '^docs/' || true)
        if [ -z "$FILES" ]; then echo "✅ 架构守卫检查通过 (无 JS/TS 变更)"; exit 0; fi
        for f in $FILES; do
          if git diff --cached -- "$f" | grep -E '^\+' | grep -v '^\+.*\/\/' | grep -qE 'export \* from'; then
            echo "❌ 发现新增export *重新导出: $f"; echo "🚫 架构重构期间禁止新增 export * 重新导出";
            echo "请使用命名导出：export { specificExport } from './module'"; exit 1; fi
        done
        for f in $FILES; do
          # 例外：配置/启动链路必须使用相对路径（TypeScript 路径别名在 Node.js/Next config 加载期不可用）
          if [ "$f" = "src/config/security.ts" ] || [ "$f" = "next.config.ts" ] || [ "$f" = "src/middleware.ts" ] || [ "$f" = "src/lib/env.ts" ]; then continue; fi
          if [ "$f" = "src/config/single-site-product-catalog.ts" ] || [ "$f" = "src/constants/product-standards.ts" ] || [ "$f" = "src/app/sitemap.ts" ] || [ "$f" = "src/config/single-site-seo.ts" ]; then continue; fi
          # 例外：barrel files (index.ts) 从子模块导入必须使用相对路径
          if [[ "$f" == *"/index.ts" ]]; then continue; fi
          if git diff --cached -- "$f" | grep -qE "^\+.*from ['\"']\./|^\+.*from ['\"']\.\./"; then
            echo "❌ 发现新增相对路径导入: $f"; echo "🚫 请使用 @/ 路径别名替代相对路径导入";
            echo "例如：import { something } from '@/lib/module'"; exit 1; fi
        done
        echo "✅ 架构守卫检查通过"
      fail_text: '架构守卫检查失败 - 发现违反架构重构规则的代码变更'
      stage_fixed: false

    # 别名一致性检查
    config-check:
      run: pnpm exec tsc --noEmit --pretty false --incremental false --noErrorTruncation
      fail_text: '别名一致性检查失败 - 请修复 tsconfig/next.config/ESLint 配置一致性'
      stage_fixed: false

    # 多语言同步检查
    i18n-sync:
      run: |
        if git diff --cached --name-only | grep -E '^(messages/|content/|i18n\.(json|ts)$|src/.+i18n|translation\.config\.js)' >/dev/null; then
          node scripts/starter-checks.js translations
        else
          echo "跳过 i18n 同步检查（无相关变更）"; exit 0;
        fi
      fail_text: '多语言同步检查失败 - 请同步 messages 与内容文件的中英版本'
      stage_fixed: false

    structural-clusters-review:
      run: pnpm exec vitest run tests/unit/middleware.test.ts tests/integration/api/lead-family-contract.test.ts tests/integration/api/health.test.ts --passWithNoTests
      fail_text: 'Structural cluster review 失败 - 请修复命中的 cluster contract / drift'
      stage_fixed: false

    # 相关测试检查 - 确保组件/库变更后测试同步更新
    # 使用 Vitest 4 的 `vitest related` 子命令
    test-related:
      run: |
        FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E '^src/.+\.(ts|tsx)$' | grep -v '\.test\.' | grep -v '\.spec\.' | grep -v '__tests__' || true)
        if [ -z "$FILES" ]; then
          echo "✅ 相关测试检查通过 (无源码变更)"; exit 0;
        fi
        echo "🧪 运行相关测试..."
        pnpm vitest related $FILES --run --passWithNoTests --reporter=dot 2>/dev/null || {
          echo ""; echo "❌ 相关测试失败 - 可能原因:";
          echo "  1. 组件 DOM 结构变更，但测试中的 getByRole/getByText 未同步";
          echo "  2. 接口属性变更，但 Mock 配置未更新";
          echo "  3. 函数签名变更，但测试断言未更新";
          echo ""; echo "💡 请检查并同步更新对应的测试文件";
          exit 1;
        }
      fail_text: '相关测试失败 - 请确保源码变更后测试同步更新（参见 .claude/rules/testing.md Twin File Principle）'
      stage_fixed: false

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
      fail_text:
        '提交信息不符合规范 - 请使用约定式提交格式：type(scope): description'

pre-push:
  parallel: false  # 串行执行，确保构建先完成
  commands:
    # 构建成功验证（A+：默认执行；紧急场景可用 RUN_FAST_PUSH=1 跳过）
    build-check:
      run: |
        if [ -n "$RUN_FAST_PUSH" ]; then
          echo "⏭️  RUN_FAST_PUSH=1: 跳过构建验证（仅用于紧急推送）";
        else
          node scripts/starter-checks.js content-manifest --check && node scripts/starter-checks.js content-slugs && node scripts/starter-checks.js validate-production-config && pnpm build
        fi
      fail_text: '构建验证失败 - 请修复构建错误后再推送'

    # 翻译验证（保持执行，速度快）
    translation-check:
      run: node scripts/starter-checks.js translations
      fail_text: '翻译验证失败 - 请确保所有翻译文件同步'

    # 架构检查（A+：全量巡航 + 循环依赖；使用 err 报告减少噪音；可用 RUN_FAST_PUSH=1 跳过应急推送）
    arch-check:
      run: |
        if [ -n "$RUN_FAST_PUSH" ]; then
          echo "⏭️  RUN_FAST_PUSH=1: 跳过架构检查（仅用于紧急推送，CI/后续本地请补跑）";
        else
          pnpm exec dependency-cruiser src --config .dependency-cruiser.js -T err
        fi
      fail_text: '架构检查失败 - 发现循环依赖或架构违规'

    # 安全检查（A+：本地执行；可用 RUN_FAST_PUSH=1 跳过应急推送）
    security-check:
      run: |
        if [ -n "$RUN_FAST_PUSH" ]; then
          echo "⏭️  RUN_FAST_PUSH=1: 跳过安全审计（仅用于紧急推送，CI 会兜底）";
        else
          pnpm audit --prod --audit-level moderate --ignore-registry-errors
        fi
      fail_text: '安全检查失败 - 发现安全漏洞，请修复后推送'

    # 死导出防复发门：全仓 knip 扫描，阻止零引用导出（尤其常量货架）无成本增长。
    # react-doctor 的 knip 规则只覆盖改动文件；此门补上全仓基线。忽略清单见 knip.json，
    # 治理面用 @public JSDoc 具名放行（参照 eslint-disable GSE 登记制）。
    dead-export-check:
      run: |
        if [ -n "$RUN_FAST_PUSH" ]; then
          echo "⏭️  RUN_FAST_PUSH=1: 跳过死导出扫描（CI 会兜底）";
        else
          pnpm knip:check
        fi
      fail_text: '死导出检查失败 - 发现零引用导出。删除它，或（若是有意的治理/公共面）用 @public JSDoc 具名放行'
