    '@tailwindcss/typography>tailwindcss': '4'
    eslint-plugin-import>eslint: '10'
    eslint-plugin-jsx-a11y>eslint: '10'
    eslint-plugin-react>eslint: '10'
    tailwindcss-animate>tailwindcss: '4'
    tsconfck>typescript: '6'
sharedWorkspaceLockfile: true
trustPolicy: no-downgrade
verifyDepsBeforeRun: true
