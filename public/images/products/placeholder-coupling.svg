<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <g transform="translate(200,150)" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Coupling connector -->
    <!-- Left item end -->
    <line x1="-80" y1="-20" x2="-30" y2="-20"/>
    <line x1="-80" y1="20" x2="-30" y2="20"/>
    <!-- Coupling body (wider section) -->
    <rect x="-30" y="-28" width="60" height="56" rx="4"/>
    <!-- Inner ring details -->
    <line x1="-10" y1="-28" x2="-10" y2="28"/>
    <line x1="10" y1="-28" x2="10" y2="28"/>
    <!-- Right item end -->
    <line x1="30" y1="-20" x2="80" y2="-20"/>
    <line x1="30" y1="20" x2="80" y2="20"/>
  </g>
</svg>
