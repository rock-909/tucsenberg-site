<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <g transform="translate(200,150)" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Straight example item -->
    <line x1="-100" y1="-20" x2="100" y2="-20"/>
    <line x1="-100" y1="20" x2="100" y2="20"/>
    <!-- Inner walls -->
    <line x1="-100" y1="-12" x2="100" y2="-12"/>
    <line x1="-100" y1="12" x2="100" y2="12"/>
    <!-- End caps -->
    <ellipse cx="-100" cy="0" rx="8" ry="20"/>
    <ellipse cx="100" cy="0" rx="8" ry="20"/>
  </g>
</svg>
