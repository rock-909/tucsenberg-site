<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <g transform="translate(200,150)" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Product example cross-section -->
    <ellipse cx="-60" cy="0" rx="24" ry="36"/>
    <ellipse cx="-60" cy="0" rx="16" ry="28"/>
    <!-- Straight product system body -->
    <line x1="-60" y1="-36" x2="60" y2="-36"/>
    <line x1="-60" y1="36" x2="60" y2="36"/>
    <line x1="-60" y1="-28" x2="60" y2="-28"/>
    <line x1="-60" y1="28" x2="60" y2="28"/>
    <!-- End cap -->
    <ellipse cx="60" cy="0" rx="24" ry="36"/>
  </g>
</svg>
